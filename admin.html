<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | BW Parastatal</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Enforce Authentication Immediately
        const currentUser = requireAuth();
        if (!localStorage.getItem('bw_announcements')) localStorage.setItem('bw_announcements', JSON.stringify([]));
        function getAnnouncements() { return JSON.parse(localStorage.getItem('bw_announcements')) || []; }
    </script>
    <style>
        body { background: var(--bg-light); margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--secondary); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 1.5rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-menu { flex: 1; padding: 1.5rem 0; overflow-y: auto; }
        .sidebar-menu a { display: block; padding: 0.8rem 1.5rem; color: #9ca3af; transition: var(--transition); border-left: 3px solid transparent; text-decoration: none; font-weight: 500; font-size:0.9rem;}
        .sidebar-menu a:hover, .sidebar-menu a.active { background: rgba(255,255,255,0.05); color: white; border-left-color: var(--primary-light); }
        .sidebar-menu i { width: 30px; }
        
        .admin-content { flex: 1; overflow-y: auto; padding: 2rem; position: relative; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; background: white; padding: 1rem 2rem; border-radius: var(--radius-md); box-shadow: var(--glass-shadow); }
        
        .stat-card { background: white; padding: 1.5rem; border-radius: var(--radius-md); box-shadow: var(--glass-shadow); display: flex; align-items: center; gap: 1rem; }
        .stat-icon { width: 50px; height: 50px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        
        .section-card { background: white; padding: 2rem; border-radius: var(--radius-md); box-shadow: var(--glass-shadow); margin-bottom: 2rem;}
        
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem;}
        .form-control { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: var(--radius-sm); outline: none; font-family: inherit; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid #e2e8f0; font-size: 0.9rem;}
        th { font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 0.8rem;}
        
        .action-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); margin-right: 0.5rem; transition: var(--transition);}
        .action-btn:hover { color: var(--primary); }
        .action-btn.delete:hover { color: #ef4444; }

        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; width: 600px; max-width: 90%; padding: 2rem; border-radius: var(--radius-md); max-height: 90vh; overflow-y: auto; position: relative;}
        .modal-close { position: absolute; right: 1.5rem; top: 1.5rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted);}
        
        .badge { padding: 0.2rem 0.5rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; background: #e2e8f0; }
        .badge.open { background: rgba(34,197,94,0.1); color: #22c55e; }
        .badge.unread { background: rgba(239,68,68,0.1); color: #ef4444; }
        .announcement-banner { background: rgba(0,77,153,0.1); border-left: 4px solid var(--primary); padding: 1rem; margin-bottom: 1rem; border-radius: var(--radius-md); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo" style="color: white; justify-content: center;">
                <span class="blue">BW</span><span style="color:white;">Portal</span>
            </a>
            <div style="margin-top: 1rem; font-size: 0.85rem; color: #9ca3af;" id="roleBadge"></div>
        </div>
        <nav class="sidebar-menu" id="sidebarMenu">
            <!-- Dynamically populated based on role -->
        </nav>
        <div style="padding: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1);">
            <a href="#" onclick="logout()" style="color: #ef4444; display: flex; align-items: center; gap: 0.5rem; text-decoration: none; font-weight: 500;"><i class="fas fa-sign-out-alt"></i> Secure Logout</a>
        </div>
    </aside>

    <main class="admin-content">
        <header class="admin-header">
            <h2 style="font-size: 1.5rem;" id="pageTitle">Dashboard Overview</h2>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div style="width: 40px; height: 40px; background: var(--primary-light); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;" id="userInitials">A</div>
                <div>
                    <div style="font-weight: 600; line-height: 1.2;" id="userName">User Name</div>
                    <div style="font-size: 0.8rem; color: var(--text-muted);" id="userEmail">email@example.com</div>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Container -->
        <div id="mainView"></div>
    </main>

    <!-- Modals -->
    <!-- Add Parastatal Modal -->
    <div class="modal-overlay" id="addParastatalModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('addParastatalModal')">&times;</button>
            <h3 style="margin-bottom: 1.5rem;">Add New Parastatal</h3>
            <form id="addParastatalForm">
                <div class="form-group"><label>Entity Name</label><input type="text" id="addPName" class="form-control" required></div>
                <div class="grid grid-cols-2" style="gap: 1rem;">
                    <div class="form-group"><label>Sector</label><select id="addPSector" class="form-control" required><option value="Energy">Energy</option><option value="Utilities">Utilities</option><option value="Finance">Finance</option></select></div>
                    <div class="form-group"><label>Region</label><select id="addPRegion" class="form-control" required><option value="National">National</option><option value="Gaborone">Gaborone</option></select></div>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top:1rem; width:100%;">Create Entity</button>
            </form>
        </div>
    </div>

    <!-- Add News Modal -->
    <div class="modal-overlay" id="addNewsModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('addNewsModal')">&times;</button>
            <h3 style="margin-bottom: 1.5rem;">Draft New Article</h3>
            <form id="addNewsForm">
                <div class="form-group"><label>Headline</label><input type="text" id="addNTitle" class="form-control" required></div>
                <div class="form-group"><label>Date</label><input type="date" id="addNDate" class="form-control" required></div>
                <div class="form-group"><label>Article Summary</label><textarea id="addNSummary" class="form-control" rows="3" required></textarea></div>
                <button type="submit" class="btn btn-primary" style="margin-top:1rem; width:100%;">Publish Article</button>
            </form>
        </div>
    </div>
    
    <!-- Add Tender Modal -->
    <div class="modal-overlay" id="addTenderModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('addTenderModal')">&times;</button>
            <h3 style="margin-bottom: 1.5rem;">Publish Tender</h3>
            <form id="addTenderForm">
                <div class="form-group"><label>Reference Number</label><input type="text" id="addTRef" class="form-control" placeholder="e.g. BPC-2026-X" required></div>
                <div class="form-group"><label>Tender Title</label><input type="text" id="addTTitle" class="form-control" required></div>
                <div class="form-group"><label>Closing Date</label><input type="date" id="addTDate" class="form-control" required></div>
                <div class="form-group"><label>Document Link URL</label><input type="url" id="addTUrl" class="form-control" value="https://example.com/tender.pdf" required></div>
                <button type="submit" class="btn btn-primary" style="margin-top:1rem; width:100%;">Publish Tender</button>
            </form>
        </div>
    </div>

    <!-- Add Document Modal -->
    <div class="modal-overlay" id="addDocumentModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('addDocumentModal')">&times;</button>
            <h3 style="margin-bottom: 1.5rem;">Upload Document</h3>
            <form id="addDocForm">
                <div class="form-group"><label>Document Title</label><input type="text" id="addDTitle" class="form-control" required></div>
                <div class="form-group"><label>Category/Type</label><select id="addDType" class="form-control"><option>Report</option><option>Act</option><option>Policy</option></select></div>
                <div class="form-group"><label>Document URL (PDF)</label><input type="url" id="addDUrl" class="form-control" value="https://example.com/doc.pdf" required></div>
                <button type="submit" class="btn btn-primary" style="margin-top:1rem; width:100%;">Upload Document</button>
            </form>
        </div>
    </div>
    
    <!-- Add Event Modal -->
    <div class="modal-overlay" id="addEventModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('addEventModal')">&times;</button>
            <h3 style="margin-bottom: 1.5rem;">Create New Event</h3>
            <form id="addEventForm">
                <div class="form-group"><label>Event Title</label><input type="text" id="addETitle" class="form-control" required></div>
                <div class="form-group"><label>Event Date</label><input type="date" id="addEDate" class="form-control" required></div>
                <div class="form-group"><label>Location</label><input type="text" id="addELoc" class="form-control" required></div>
                <div class="form-group"><label>Description</label><textarea id="addEDesc" class="form-control" rows="3" required></textarea></div>
                <button type="submit" class="btn btn-primary" style="margin-top:1rem; width:100%;">Post Event</button>
            </form>
        </div>
    </div>

    <!-- Add News Modal -->
    <div class="modal-overlay" id="addNewsModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('addNewsModal')">&times;</button>
            <h3 style="margin-bottom: 1.5rem;">Publish News Article</h3>
            <form id="addNewsForm">
                <div class="form-group"><label>Article Title</label><input type="text" id="addNTitle" class="form-control" required></div>
                <div class="form-group"><label>Summary</label><textarea id="addNSummary" class="form-control" rows="2" required></textarea></div>
                <div class="form-group"><label>Image URL (Mock)</label><input type="url" id="addNImage" class="form-control" placeholder="https://picsum.photos/800/600" required></div>
                <button type="submit" class="btn btn-primary" style="margin-top:1rem; width:100%;">Publish Now</button>
            </form>
        </div>
    </div>

    <!-- Read Message Modal -->
    <div class="modal-overlay" id="readMessageModal">
        <div class="modal-content" style="max-width: 500px;">
            <button class="modal-close" onclick="closeModal('readMessageModal')">&times;</button>
            <h3 style="margin-bottom: 0.5rem;" id="rmSubject">Support Ticket</h3>
            <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem;" id="rmMeta">From: John Doe</div>
            <div style="background: var(--bg-light); padding: 1.5rem; border-radius: var(--radius-sm); font-size: 0.95rem; margin-bottom: 1.5rem;" id="rmBody">Message body</div>
            <button class="btn btn-outline" style="width:100%;" onclick="closeModal('readMessageModal')">Close Message</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('userName').innerText = currentUser.name;
            document.getElementById('userEmail').innerText = currentUser.email;
            document.getElementById('userInitials').innerText = currentUser.name.charAt(0).toUpperCase();
            
            const roleBadge = currentUser.role === 'super_admin' ? 
                '<span style="background:var(--primary); color:white; padding:0.2rem 0.5rem; border-radius:4px;">Super Admin</span>' : 
                '<span style="background:#22c55e; color:white; padding:0.2rem 0.5rem; border-radius:4px;">Parastatal Admin</span>';
            document.getElementById('roleBadge').innerHTML = roleBadge;

            renderSidebar();
            loadView('dashboard');
        });

        function loadView(viewId, event) {
            if(event) event.preventDefault();
            document.querySelectorAll('.sidebar-menu a').forEach(a => a.classList.remove('active'));
            const link = document.querySelector(`.sidebar-menu a[data-view="${viewId}"]`);
            if(link) link.classList.add('active');

            const mainView = document.getElementById('mainView');
            const pageTitle = document.getElementById('pageTitle');
            
            if (viewId === 'dashboard') {
                pageTitle.innerText = "Dashboard Overview";
                currentUser.role === 'super_admin' ? renderSuperDashboard(mainView) : renderParaDashboard(mainView);
            } else if (viewId === 'directory') {
                pageTitle.innerText = "Global Directory";
                renderDirectoryEditor(mainView);
            } else if (viewId === 'users') {
                pageTitle.innerText = "System Users";
                renderUsersEditor(mainView);
            } else if (viewId === 'inbox') {
                pageTitle.innerText = currentUser.role === 'super_admin' ? "Global Master Inbox" : "Citizen Inbox";
                renderInbox(mainView);
            } else if (viewId === 'tenders') {
                pageTitle.innerText = currentUser.role === 'super_admin' ? "Global Tenders" : "Our Tenders";
                renderTendersEditor(mainView);
            } else if (viewId === 'documents') {
                pageTitle.innerText = currentUser.role === 'super_admin' ? "Global Documents" : "Our Documents";
                renderDocsEditor(mainView);
            } else if (viewId === 'events') {
                pageTitle.innerText = "Events Calendar";
                renderEventsEditor(mainView);
            } else if (viewId === 'internal_chat') {
                pageTitle.innerText = "Internal Communication";
                renderInternalChat(mainView);
            } else if (viewId === 'analytics') {
                pageTitle.innerText = "Data Reports & Analytics";
                renderAnalytics(mainView);
            } else if (viewId === 'settings') {
                pageTitle.innerText = "Settings & Profile";
                renderSettings(mainView);
            } else if (viewId === 'my_profile') {
                pageTitle.innerText = "Organization Profile";
                renderMyProfileEditor(mainView);
            } else if (viewId === 'my_news') {
                pageTitle.innerText = "News & Announcements";
                renderMyNewsEditor(mainView);
            }
        }

        function renderSidebar() {
            const menu = document.getElementById('sidebarMenu');
            let links = `<a href="#" data-view="dashboard" onclick="loadView('dashboard', event)"><i class="fas fa-tachometer-alt"></i> Dashboard</a>`;
            
            if (currentUser.role === 'super_admin') {
                links += `
                    <a href="#" data-view="inbox" onclick="loadView('inbox', event)"><i class="fas fa-inbox"></i> Global Inbox</a>
                    <a href="#" class="mt-2" style="font-size: 0.75rem; text-transform:uppercase; letter-spacing:1px; color:#cbd5e1; pointer-events:none; padding-bottom:0.2rem;">Management</a>
                    <a href="#" data-view="directory" onclick="loadView('directory', event)"><i class="fas fa-building"></i> Directory</a>
                    <a href="#" data-view="users" onclick="loadView('users', event)"><i class="fas fa-users-cog"></i> Users</a>
                    <a href="#" data-view="tenders" onclick="loadView('tenders', event)"><i class="fas fa-file-contract"></i> Tenders</a>
                    <a href="#" data-view="documents" onclick="loadView('documents', event)"><i class="fas fa-file-pdf"></i> Documents</a>
                    <a href="#" data-view="events" onclick="loadView('events', event)"><i class="fas fa-calendar-alt"></i> National Events</a>
                    <a href="#" data-view="internal_chat" onclick="loadView('internal_chat', event)"><i class="fas fa-comments"></i> Internal Comms</a>
                    <a href="#" data-view="analytics" onclick="loadView('analytics', event)"><i class="fas fa-chart-line"></i> Reports & Analytics</a>
                    <a href="#" data-view="settings" onclick="loadView('settings', event)" style="margin-top:1rem;"><i class="fas fa-cog"></i> System Settings</a>
                `;
            } else {
                links += `
                    <a href="#" data-view="inbox" onclick="loadView('inbox', event)"><i class="fas fa-inbox"></i> Inbox (Tickets)</a>
                    <a href="#" data-view="internal_chat" onclick="loadView('internal_chat', event)"><i class="fas fa-headset"></i> Contact Super Admin</a>
                    <a href="#" class="mt-2" style="font-size: 0.75rem; text-transform:uppercase; letter-spacing:1px; color:#cbd5e1; pointer-events:none; padding-bottom:0.2rem;">Publishing</a>
                    <a href="#" data-view="my_profile" onclick="loadView('my_profile', event)"><i class="fas fa-id-card"></i> Profile Info</a>
                    <a href="#" data-view="my_news" onclick="loadView('my_news', event)"><i class="fas fa-newspaper"></i> News Posts</a>
                    <a href="#" data-view="tenders" onclick="loadView('tenders', event)"><i class="fas fa-file-contract"></i> Tenders</a>
                    <a href="#" data-view="documents" onclick="loadView('documents', event)"><i class="fas fa-folder-open"></i> Documents</a>
                    <a href="#" data-view="events" onclick="loadView('events', event)"><i class="fas fa-calendar-day"></i> Calendar</a>
                    <a href="#" data-view="analytics" onclick="loadView('analytics', event)"><i class="fas fa-chart-pie"></i> Org Analytics</a>
                    <a href="#" data-view="settings" onclick="loadView('settings', event)" style="margin-top:1rem;"><i class="fas fa-cog"></i> Account Settings</a>
                `;
            }
            
            links += `<a href="index.html" style="margin-top: 1rem;"><i class="fas fa-external-link-alt"></i> Public Site</a>`;
            menu.innerHTML = links;
        }

        // --- DASHBOARDS ---
        function renderSuperDashboard(container) {
            const parastatals = getParastatals(); const users = getUsers(); const msgs = getMessages();
            const unread = msgs.filter(m => m.status !== 'Read').length;
            
            container.innerHTML = `
                <div class="grid grid-cols-4 mb-6">
                    <div class="stat-card" style="cursor:pointer;" onclick="loadView('directory')">
                        <div class="stat-icon" style="background: rgba(0,77,153,0.1); color: var(--primary);"><i class="fas fa-building"></i></div>
                        <div><h4 style="font-size: 1.5rem;">${parastatals.length}</h4><span style="color: var(--text-muted); font-size: 0.85rem;">Entities</span></div>
                    </div>
                    <div class="stat-card" style="cursor:pointer;" onclick="loadView('inbox')">
                        <div class="stat-icon" style="background: rgba(239,68,68,0.1); color: #ef4444;"><i class="fas fa-inbox"></i></div>
                        <div><h4 style="font-size: 1.5rem;">${unread}</h4><span style="color: var(--text-muted); font-size: 0.85rem;">Open Tickets</span></div>
                    </div>
                    <div class="stat-card" style="cursor:pointer;" onclick="loadView('users')">
                        <div class="stat-icon" style="background: rgba(245,158,11,0.1); color: #f59e0b;"><i class="fas fa-users"></i></div>
                        <div><h4 style="font-size: 1.5rem;">${users.length}</h4><span style="color: var(--text-muted); font-size: 0.85rem;">Admins</span></div>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 mb-6" style="gap: 2rem;">
                    <div class="section-card">
                        <h3>Broadcast System Announcement</h3>
                        <p style="color: var(--text-muted); margin-bottom: 1rem; font-size:0.9rem;">Send an alert to all Parastatal Admins' dashboards.</p>
                        <form onsubmit="event.preventDefault(); broadcastAnnounce();">
                            <textarea id="announceText" class="form-control" rows="2" placeholder="Write message..." required></textarea>
                            <button class="btn btn-primary" style="margin-top: 1rem;">Broadcast Message</button>
                        </form>
                    </div>
                    <div class="section-card" style="display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
                        <i class="fas fa-shield-alt" style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem; opacity:0.2;"></i>
                        <h4>System Security Protocol Active</h4>
                        <p style="font-size: 0.85rem; color: var(--text-muted); margin-top:0.5rem;">All administrative actions are being logged and monitored for national security and transparency.</p>
                    </div>
                </div>
            `;
        }

        function broadcastAnnounce() {
            const anns = getAnnouncements();
            anns.push({ id: Date.now(), text: document.getElementById('announceText').value, date: new Date().toLocaleDateString() });
            localStorage.setItem('bw_announcements', JSON.stringify(anns));
            alert("Broadcast sent globally!");
            document.getElementById('announceText').value = '';
        }

        function renderParaDashboard(container) {
            const msgs = getMessages().filter(m => parseInt(m.parastatal_id) === currentUser.parastatal_id);
            const myOrg = getParastatals().find(p => p.id === currentUser.parastatal_id);
            const anns = getAnnouncements();
            
            let html = '';
            if(anns.length > 0) {
                const latest = anns[anns.length-1];
                html += `<div class="announcement-banner"><strong><i class="fas fa-bullhorn"></i> Super Admin Broadcast (${latest.date}):</strong> ${latest.text}</div>`;
            }

            html += `
                <div class="section-card" style="border-left: 4px solid var(--primary); margin-bottom: 2rem;">
                    <h3>Welcome, ${myOrg ? myOrg.name : 'Unknown'}</h3>
                    <p style="color: var(--text-muted); margin-top: 0.5rem; font-size:0.9rem;">Review your notifications and manage your public presence.</p>
                </div>

                <div class="grid grid-cols-3 mb-6" style="gap: 1.5rem;">
                    <div class="stat-card" style="cursor:pointer;" onclick="loadView('inbox')">
                        <div class="stat-icon" style="background: rgba(239,68,68,0.1); color: #ef4444;"><i class="fas fa-ticket-alt"></i></div>
                        <div><h4 style="font-size: 1.5rem;">${msgs.length}</h4><span style="color: var(--text-muted); font-size: 0.85rem;">Open Tickets</span></div>
                    </div>
                    <div class="stat-card" style="cursor:pointer;" onclick="loadView('my_news')">
                        <div class="stat-icon" style="background: rgba(0,77,153,0.1); color: var(--primary);"><i class="fas fa-newspaper"></i></div>
                        <div><h4 style="font-size: 1.5rem;">Publish</h4><span style="color: var(--text-muted); font-size: 0.85rem;">News Posts</span></div>
                    </div>
                    <div class="stat-card" style="cursor:pointer;" onclick="loadView('my_profile')">
                        <div class="stat-icon" style="background: rgba(34,197,94,0.1); color: #22c55e;"><i class="fas fa-id-card"></i></div>
                        <div><h4 style="font-size: 1.5rem;">Update</h4><span style="color: var(--text-muted); font-size: 0.85rem;">Org Profile</span></div>
                    </div>
                </div>

                <div class="grid grid-cols-2" style="gap: 2rem;">
                    <div class="section-card">
                        <h4><i class="fas fa-tasks"></i> Recent Activity</h4>
                        <div style="margin-top: 1rem; font-size: 0.9rem; color: var(--text-muted);">
                           <div style="padding: 0.5rem 0; border-bottom: 1px solid #f1f5f9;">&bull; Organization profile was updated manually.</div>
                           <div style="padding: 0.5rem 0; border-bottom: 1px solid #f1f5f9;">&bull; Document library synchronization stable.</div>
                           <div style="padding: 0.5rem 0;">&bull; No unauthorized access attempts detected.</div>
                        </div>
                    </div>
                    <div class="section-card">
                        <h4><i class="fas fa-rocket"></i> Quick Launch</h4>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:0.55rem; margin-top:1rem;">

            const chatLog = document.getElementById('chatMessages');

            const input = document.getElementById('chatInput');

            const chat = getInternalChat();
            chat.push({
                channel_id: localStorage.getItem('active_chat_id'),
                sender: currentUser.role,
                sender_name: currentUser.name,
                text: input.value,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            localStorage.setItem('bw_internal_chat', JSON.stringify(chat));
            input.value = '';
            refreshChatDisplay();
        }

                summary: document.getElementById('addNSummary').value,
                image: document.getElementById('addNImage').value,
                date: new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'}),
                parastatal: org ? org.name : "BW National"
            });
            localStorage.setItem('bw_news', JSON.stringify(ns));
            closeModal('addNewsModal'); loadView('my_news');
        });

        document.getElementById('addEventForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const es = getEvents();
            es.push({
                id: Date.now(),
                title: document.getElementById('addETitle').value,
                date: document.getElementById('addEDate').value,
                location: document.getElementById('addELoc').value,
                description: document.getElementById('addEDesc').value,
                parastatal_id: currentUser.role === 'super_admin' ? 2 : currentUser.parastatal_id
            });
            localStorage.setItem('bw_events', JSON.stringify(es));
            closeModal('addEventModal'); loadView('events');
        });

    </script>
</body>
</html>
