<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BW Parastatal | Connecting State-Owned Enterprises</title>
    <meta name="description" content="BW Parastatal is a digital platform that connects Botswana’s state-owned enterprises with the public, stakeholders, and potential partners.">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- NAV -->
<nav class="navbar">
    <div class="container nav-container">
        <a href="index.html" class="logo">
            <img src="assets/logo.jpg" style="height:40px;border-radius:4px;">
        </a>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="directory.html">Directory</a>
            <a href="services.html">Services</a>

            <a href="admin.html" class="btn btn-outline" style="margin-left:1rem;">
                Portal Login
            </a>
        </div>
    </div>
</nav>

<!-- HERO -->
<header class="hero">
    <div class="container grid grid-cols-2">
        <div>
            <h1>
                Connecting Botswana's 
                <span style="color:var(--primary)">Parastatals</span>
            </h1>

            <p>
                A central digital hub for state-owned enterprises.
            </p>

            <div style="display:flex;gap:0.5rem;">
                <input id="homeSearchInput" placeholder="Search..." />
                <button id="homeSearchBtn">Search</button>

                <!-- AI BUTTON -->
                <button onclick="openAISearch()" class="btn">
                    <i class="fas fa-robot"></i> AI
                </button>
            </div>
        </div>
    </div>
</header>

<!-- FOOTER -->
<footer>
    <div class="container">
        <p>© 2026 BW Parastatal</p>
    </div>
</footer>

<script src="js/data.js"></script>
<script src="js/main.js"></script>

<script>
/* REPLACED AI FUNCTION */
function openAISearch() {
    if (window.chatbase) {
        window.chatbase("open");
    }
}

/* SEARCH */
document.getElementById('homeSearchBtn').onclick = () => {
    const q = document.getElementById('homeSearchInput').value;
    if(q) location.href = `directory.html?search=${q}`;
};
</script>

<!-- CHATBASE -->
<script>
(function(){
if(!window.chatbase||window.chatbase("getState")!=="initialized"){
    window.chatbase=(...arguments)=>{
        if(!window.chatbase.q){window.chatbase.q=[]}
        window.chatbase.q.push(arguments)
    };
    window.chatbase=new Proxy(window.chatbase,{
        get(target,prop){
            if(prop==="q"){return target.q}
            return(...args)=>target(prop,...args)
        }
    })
}
const onLoad=function(){
    const script=document.createElement("script");
    script.src="https://www.chatbase.co/embed.min.js";
    script.id="Hjtb9Qotuf_Cdo7pYmgFs";
    script.domain="www.chatbase.co";
    document.body.appendChild(script)
};
if(document.readyState==="complete"){
    onLoad()
}else{
    window.addEventListener("load",onLoad)
}
})();
</script>

</body>
</html>
