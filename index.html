<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BW Parastatal – Botswana's Parastatal News Hub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Serif+4:wght@300;400;600&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--blue:#00aaff;--dark:#111;--muted:#888;}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Barlow',sans-serif;background:#efefef;color:#111;}
.page{display:none;}.page.active{display:block;}

/* HEADER */
#site-header{background:#111;position:sticky;top:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:11px 24px;}
.logo-text{font-family:'Oswald',sans-serif;font-size:1.9rem;font-weight:700;color:#fff;text-decoration:none;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;}
.logo-text span{color:var(--blue);}
.icon-btn{background:none;border:none;color:#bbb;cursor:pointer;padding:7px;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:color .2s,background .2s;}
.icon-btn:hover{color:#fff;background:rgba(255,255,255,.1);}
.hamburger{display:none;}

/* DESKTOP NAV */
#main-nav{background:#fff;border-bottom:1px solid #ddd;position:sticky;top:57px;z-index:499;box-shadow:0 2px 6px rgba(0,0,0,.06);}
.nav-inner{display:flex;overflow-x:auto;scrollbar-width:none;max-width:1160px;margin:0 auto;padding:0 16px;}
.nav-inner::-webkit-scrollbar{display:none;}
.nav-btn{font-family:'Barlow',sans-serif;font-weight:600;font-size:.83rem;color:#444;background:none;border:none;border-bottom:3px solid transparent;padding:13px 15px;cursor:pointer;white-space:nowrap;transition:color .18s,border-color .18s;letter-spacing:.02em;}
.nav-btn:hover{color:var(--blue);}
.nav-btn.active{color:var(--blue);border-bottom-color:var(--blue);}

/* MOBILE NAV */
#mobile-nav{display:none;background:#fff;border-top:1px solid #eee;flex-direction:column;}
#mobile-nav.open{display:flex;}
#mobile-nav .nav-btn{border-bottom:1px solid #f2f2f2;border-left:3px solid transparent;text-align:left;padding:13px 20px;}
#mobile-nav .nav-btn.active{border-left-color:var(--blue);}

/* SEARCH OVERLAY */
#search-overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.93);backdrop-filter:blur(10px);align-items:flex-start;justify-content:center;padding-top:11vh;overflow-y:auto;}
#search-overlay.open{display:flex;}
.s-inner{width:100%;max-width:700px;padding:0 20px 80px;}
.s-box{display:flex;align-items:center;gap:12px;background:#1b1b1b;border:2px solid var(--blue);border-radius:6px;padding:14px 18px;}
#s-input{background:none;border:none;outline:none;color:#fff;font-family:'Barlow',sans-serif;font-size:1.18rem;font-weight:500;width:100%;}
#s-input::placeholder{color:#444;}
.s-close{background:none;border:none;color:#555;cursor:pointer;display:flex;padding:2px;transition:color .2s;}
.s-close:hover{color:#fff;}
.s-hint{font-size:.74rem;color:#3a3a3a;margin:10px 0 22px 3px;letter-spacing:.03em;}
.s-lbl{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.13em;color:#383838;margin-bottom:10px;padding:0 2px;}
.s-row{display:flex;align-items:center;gap:14px;background:#181818;border:1px solid #242424;border-radius:4px;padding:11px 14px;margin-bottom:6px;cursor:pointer;text-decoration:none;transition:border-color .18s,background .18s;}
.s-row:hover{border-color:var(--blue);background:#192535;}
.s-thumb{width:54px;height:42px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background-size: cover; background-position: center;}
.s-rc{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);margin-bottom:3px;}
.s-rt{font-family:'Oswald',sans-serif;font-size:.9rem;font-weight:600;color:#ddd;line-height:1.3;}
.s-rd{font-size:.67rem;color:#444;margin-top:2px;}
mark{background:rgba(0,170,255,.2);color:var(--blue);border-radius:2px;padding:0 1px;}
.s-none{color:#444;font-size:.9rem;padding:22px 4px;}

/* HERO GRID */
.hero-section{background:#191919;padding:18px 20px;}
.hero-grid{
  display:grid;
  grid-template-columns:46fr 27fr 27fr;
  grid-template-rows:220px 220px;
  gap:4px;
  max-width:1160px;
  margin:0 auto;
}
.hero-card{position:relative;overflow:hidden;cursor:pointer;border:2px solid var(--blue);background:#1a1a1a;}
.hero-card.big{grid-row:1/3;grid-column:1/2;}
.h-bg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:transform .4s;background-size: cover; background-position: center;}
.hero-card:hover .h-bg{transform:scale(1.05);}
.h-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent 0%,rgba(0,0,0,.9) 60%);padding:44px 14px 14px;pointer-events:none;}
.h-overlay h2{font-family:'Oswald',sans-serif;font-weight:700;color:#fff;text-transform:uppercase;line-height:1.28;margin-bottom:5px;font-size:.97rem;}
.hero-card.big .h-overlay h2{font-size:1.38rem;}
.h-date{font-size:.69rem;color:#bbb;}

/* LAYOUT */
.body-wrap{max-width:1160px;margin:0 auto;padding:26px 16px;display:grid;grid-template-columns:1fr 228px;gap:26px;}
.body-wrap.full{grid-template-columns:1fr;}

/* SECTION HEADER */
.sec-hdr{display:flex;align-items:center;margin-bottom:16px;}
.sec-title{font-family:'Oswald',sans-serif;font-size:1.9rem;font-weight:700;color:#111;flex-shrink:0;}
.sec-line{flex:1;height:2px;background:#ddd;margin:0 13px;}
.sec-more{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#555;background:none;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:3px;flex-shrink:0;transition:color .18s;}
.sec-more:hover{color:var(--blue);}

/* NEWS CARDS */
.news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:32px;}
.n-card{background:#fff;cursor:pointer;transition:box-shadow .2s,transform .15s;}
.n-card:hover{box-shadow:0 6px 22px rgba(0,0,0,.13);transform:translateY(-2px);}
.n-img-wrap{position:relative;overflow:hidden;}
.n-img{width:100%;height:150px;display:flex;align-items:center;justify-content:center;transition:transform .3s;background-size: cover; background-position: center;}
.n-card:hover .n-img{transform:scale(1.04);}
.n-cat{position:absolute;bottom:0;left:0;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#fff;background:var(--blue);padding:2px 9px;}
.n-cat.green{background:#2ea043;}.n-cat.orange{background:#e07b00;}.n-cat.purple{background:#7c3aed;}.n-cat.red{background:#dc2626;}.n-cat.teal{background:#0d9488;}
.n-body{padding:10px 0 4px;}
.n-body h3{font-family:'Oswald',sans-serif;font-size:.97rem;font-weight:600;color:#111;line-height:1.34;margin-bottom:5px;}
.n-body .dt{font-size:.71rem;color:var(--muted);display:flex;align-items:center;gap:4px;}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:18px;}
.sb-box{background:#fff;border:1px solid #e5e5e5;padding:14px;}
.sb-title{font-family:'Oswald',sans-serif;font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:var(--blue);color:#fff;padding:5px 12px;margin:-14px -14px 14px;}
.sb-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0;text-decoration:none;color:inherit;cursor:pointer;transition:background .12s;}
.sb-item:hover .sb-item-t{color:var(--blue);}
.sb-thumb{width:54px;height:42px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;background-size: cover; background-position: center;}
.sb-item-t{font-family:'Oswald',sans-serif;font-size:.78rem;font-weight:600;color:#111;line-height:1.3;margin-bottom:3px;transition:color .18s;}
.sb-item-d{font-size:.66rem;color:#999;}
.ad-block{background:#e6e6e6;display:flex;align-items:center;justify-content:center;min-height:130px;font-size:.75rem;color:#bbb;letter-spacing:.06em;text-transform:uppercase;border:1px solid #d8d8d8;}

/* VIDEO GALLERY */
.vid-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
.vid-card{background:#fff;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:box-shadow .2s,transform .15s;}
.vid-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.14);transform:translateY(-3px);}
.vid-ratio{position:relative;width:100%;padding-top:56.25%;background:#111;}
.vid-ratio iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.vid-body{padding:12px 14px 14px;}
.vid-cat{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);margin-bottom:4px;}
.vid-title{font-family:'Oswald',sans-serif;font-size:.97rem;font-weight:600;color:#111;line-height:1.35;margin-bottom:6px;}
.vid-meta{font-size:.7rem;color:var(--muted);display:flex;align-items:center;gap:5px;}

/* ARTICLE PAGE */
.art-wrap{max-width:1160px;margin:0 auto;padding:26px 16px;display:grid;grid-template-columns:1fr 228px;gap:26px;}
.art-hero{width:100%;height:320px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;background-size: cover; background-position: center;}
.art-title{font-family:'Oswald',sans-serif;font-size:1.65rem;font-weight:700;color:var(--blue);text-transform:uppercase;line-height:1.2;margin-bottom:6px;}
.art-body{font-family:'Source Serif 4',serif;font-size:.96rem;line-height:1.85;color:#222;}

/* FOOTER */
footer{background:#111;color:#ccc;padding:34px 24px 14px;margin-top:20px;}
.footer-bottom{max-width:1160px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.footer-bottom a{color:var(--blue);text-decoration:none;}

@media(max-width:960px){
  .body-wrap,.art-wrap{grid-template-columns:1fr;}
  .news-grid{grid-template-columns:repeat(2,1fr);}
  .hero-grid{grid-template-columns:1fr 1fr;grid-template-rows:repeat(3,180px);}
  .hero-card.big{grid-column:1/3;grid-row:1/2;}
}
@media(max-width:640px){
  .hamburger{display:flex!important;}
  .nav-inner{display:none!important;}
  .hero-grid{grid-template-columns:1fr;grid-template-rows:none;}
  .hero-card.big{grid-column:auto;grid-row:auto;}
  .news-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="search-overlay">
  <div class="s-inner">
    <div class="s-box">
      <i data-lucide="search" width="20" height="20" style="color:var(--blue);flex-shrink:0;"></i>
      <input id="s-input" type="text" placeholder="Search articles, tenders..." oninput="runSearch(this.value)">
      <button class="s-close" onclick="closeSearch()"><i data-lucide="x" width="20" height="20"></i></button>
    </div>
    <div id="s-results"></div>
  </div>
</div>

<header id="site-header">
  <button class="icon-btn hamburger" onclick="toggleMob()"><i data-lucide="menu" width="22" height="22"></i></button>
  <span class="logo-text" onclick="nav('home')"><span>BW</span> PARASTATAL</span>
  <button class="icon-btn" onclick="openSearch()"><i data-lucide="search" width="20" height="20"></i></button>
</header>

<nav id="mobile-nav">
  <button class="nav-btn active" onclick="nav('home')">Home</button>
  <button class="nav-btn" onclick="nav('latest')">Latest News</button>
  <button class="nav-btn" onclick="nav('business')">Business</button>
  <button class="nav-btn" onclick="nav('tenders')">Tenders</button>
  <button class="nav-btn" onclick="nav('vacancies')">Vacancies</button>
  <button class="nav-btn" onclick="nav('archives')">Archives</button>
  <button class="nav-btn" onclick="nav('videos')">Video Gallery</button>
</nav>

<nav id="main-nav">
  <div class="nav-inner">
    <button class="nav-btn active" data-page="home" onclick="nav('home')">Home</button>
    <button class="nav-btn" data-page="latest" onclick="nav('latest')">Latest News</button>
    <button class="nav-btn" data-page="business" onclick="nav('business')">Business</button>
    <button class="nav-btn" data-page="tenders" onclick="nav('tenders')">Tenders</button>
    <button class="nav-btn" data-page="vacancies" onclick="nav('vacancies')">Vacancies</button>
    <button class="nav-btn" data-page="archives" onclick="nav('archives')">Archives</button>
    <button class="nav-btn" data-page="videos" onclick="nav('videos')">Video Gallery</button>
  </div>
</nav>

<div id="page-home" class="page active">
  <section class="hero-section">
    <div class="hero-grid" id="hero-grid">
        </div>
  </section>

  <div class="body-wrap">
    <main>
      <section>
        <div class="sec-hdr">
          <h2 class="sec-title">Latest News</h2>
          <div class="sec-line"></div>
          <button class="sec-more" onclick="nav('latest')">more <i data-lucide="chevron-right" width="13" height="13"></i></button>
        </div>
        <div class="news-grid" id="home-latest"></div>
      </section>
      <section>
        <div class="sec-hdr">
          <h2 class="sec-title">Business</h2>
          <div class="sec-line"></div>
          <button class="sec-more" onclick="nav('business')">more <i data-lucide="chevron-right" width="13" height="13"></i></button>
        </div>
        <div class="news-grid" id="home-business"></div>
      </section>
    </main>
    <aside class="sidebar">
      <div class="sb-box">
        <div class="sb-title">Featured</div>
        <div id="sb-featured"></div>
      </div>
      <div class="ad-block">Ad Space</div>
    </aside>
  </div>
</div>

<div id="page-latest" class="page">
  <div class="body-wrap full">
    <div class="page-hdr"><i data-lucide="newspaper"></i> Latest News</div>
    <div class="news-grid" id="pg-latest"></div>
  </div>
</div>

<div id="page-article" class="page">
  <div class="art-wrap">
    <div>
      <button class="back-btn" onclick="goBack()"><i data-lucide="arrow-left"></i> Back</button>
      <div class="art-hero" id="art-hero"></div>
      <h1 class="art-title" id="art-title"></h1>
      <div class="art-body" id="art-body"></div>
    </div>
    <aside class="sidebar" id="art-sb-list"></aside>
  </div>
</div>

<footer>
  <div class="footer-bottom">
    <p>© 2026 BW Parastatal. All rights reserved</p>
    <p>By <a href="#">Motswana Intelligence</a></p>
  </div>
</footer>

<script>
const ARTS = {
  'botswana-post':{sec:'latest',cat:'LATEST NEWS',color:'g1',icon:'mail',org:'Botswana Post',
    img: 'https://9e7ob4ithr.ufs.sh/f/HNFKSznLKuFPGYesDPZVETfSYglu9yUkC7MiOa12I6FDoHcV',
    title:'Botswana Post Launches Digital Transformation Drive Across All 96 Outlets',date:'12 March 2026',
    body:`<p>Botswana Post has kicked off an ambitious P180 million digital transformation programme...</p>`},
  'burs-award':{sec:'business',cat:'BUSINESS',color:'g2',icon:'award',org:'BURS',
    img: 'https://9e7ob4ithr.ufs.sh/f/HNFKSznLKuFPRJL6UldSVUX6I3mFnW2QkEGAl7gb5ZqzpyCD',
    title:'BURS Wins Best Tax Authority Award at Africa Expo 2026',date:'05 April 2026',
    body:`<p>The Botswana Unified Revenue Service (BURS) has been honoured with Best Tax Authority...</p>`},
  'lea-strategy':{sec:'business',cat:'BUSINESS',color:'g3',icon:'trending-up',org:'LEA',
    img: 'https://9e7ob4ithr.ufs.sh/f/HNFKSznLKuFPWovNIgA1FrSCvygLpDXmbcIidOhx1Yu8GKUN',
    title:'LEA Rolls Out P50M SME Acceleration Fund for 2026',date:'08 February 2026',
    body:`<p>The Local Enterprise Authority (LEA) has launched a P50 million SME Acceleration Fund...</p>`},
  'bpc-corporate':{sec:'business',cat:'BUSINESS',color:'g5',icon:'zap',org:'BPC',
    img: 'https://9e7ob4ithr.ufs.sh/f/HNFKSznLKuFPKQbNMj3gILlVxCkW39qjMG2tA08rdU6yhTf1',
    title:'BPC Commissions 300MW Solar Plant in Kgalagadi',date:'14 March 2026',
    body:`<p>BPC has officially commissioned the 300-megawatt Kgalagadi Solar PV Plant...</p>`}
};

function nav(pageId){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+pageId).classList.add('active');
  window.scrollTo(0,0);
}

function openArticle(id){
  const a=ARTS[id];
  document.getElementById('art-title').textContent=a.title;
  document.getElementById('art-hero').style.backgroundImage=`url('${a.img}')`;
  document.getElementById('art-body').innerHTML=a.body;
  nav('article');
}

function buildHero(){
  const heroIds = ['botswana-post','burs-award','lea-strategy','bpc-corporate'];
  const grid = document.getElementById('hero-grid');
  grid.innerHTML = heroIds.map((id, index) => {
    const a = ARTS[id];
    return `
      <div class="hero-card ${index===0?'big':''}" onclick="openArticle('${id}')">
        <div class="h-bg" style="background-image: url('${a.img}')"></div>
        <div class="h-overlay">
          <h2>${a.title}</h2>
          <p class="h-date">${a.date}</p>
        </div>
      </div>`;
  }).join('');
}

function populateHome(){
  const latest = Object.entries(ARTS).filter(([,a])=>a.sec==='latest');
  document.getElementById('home-latest').innerHTML = latest.map(([id,a])=>`
    <div class="n-card" onclick="openArticle('${id}')">
      <div class="n-img" style="background-image: url('${a.img}')"></div>
      <div class="n-body"><h3>${a.title}</h3></div>
    </div>`).join('');
  buildHero();
  lucide.createIcons();
}

document.addEventListener('DOMContentLoaded',()=>{
  populateHome();
  nav('home');
});

(function(){if(!window.chatbase||window.chatbase("getState")!=="initialized"){window.chatbase=(...arguments)=>{if(!window.chatbase.q){window.chatbase.q=[]}window.chatbase.q.push(arguments)};window.chatbase=new Proxy(window.chatbase,{get(target,prop){if(prop==="q"){return target.q}return(...args)=>target(prop,...args)}})}const onLoad=function(){const script=document.createElement("script");script.src="https://www.chatbase.co/embed.min.js";script.id="Hjtb9Qotuf_Cdo7pYmgFs";script.domain="www.chatbase.co";document.body.appendChild(script)};if(document.readyState==="complete"){onLoad()}else{window.addEventListener("load",onLoad)}})();
</script>
</body>
</html>
